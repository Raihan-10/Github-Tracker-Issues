<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>all-cards</title>

  <!-- daisy UI and tailwindcss -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome cdn -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    .font {
      font-family: "Geist", sans-serif;

    }
  </style>
</head>

<body class="bg-[#f8fafcFF] min-h-screen font">

  <!-- navbar -->
  <section class="bg-white">
    <div class="navbar flex flex-col md:flex-row justify-between shadow-sm md:px-20 gap-3 py-4">
      <div class="logo flex flex-row items-center gap-1 ">
        <img src="./assets/github-logo.png" class="md:w-9 w-8" alt="">
        <h2 class="text-[#1f2937] leading-[1.2] text-lg md:text-2xl font-semibold cursor-pointer"><a
            href="./index.html">Issues Tracker</a> </h2>
      </div>

      <!-- search -->
      <div class="search flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
        <div class="relative flex items-center w-full">
          <i class="fa-solid fa-magnifying-glass absolute left-4 text-[#64748b]md: text-lg"></i>
          <input id="search-input" type="text" placeholder="Search issues..."
            class="border border-[#e4e4e7] rounded-lg w-full lg:w-[450px] py-3 pl-12 pr-4 text-[#64748b]">
        </div>

        <button
          class="cursor-pointer bg-[#4a00ff] text-white px-4 py-3 rounded-lg flex items-center font-semibold text-[16px] sm:w-auto whitespace-nowrap">
          <span class="mr-1 text-xl ">+</span> New Issue
        </button>
      </div>
    </div>
  </section>

  <!-- left right padding -->
  <section class="max-w-[1110px] mx-auto bg-[#fbfbfb] ">

    <!-- status button -->
    <section
      class="card  bg-white mt-8 md:mt-[60px] flex md:flex-row justify-center md:justify-start gap-2 p-4 md:p-6 shadow-md">
      <button onclick="switchTab('all')" id="all-btn"
        class="cursor-pointer flex-1 sm:flex-none min-w-[100px] rounded-sm text-white py-2 px-3 bg-[#4a00ff]">All</button>
      <button onclick="switchTab('open')" id="open-btn"
        class="cursor-pointer flex-1 sm:flex-none min-w-[100px] rounded-sm text-white py-2 px-3 border-[#e4e4e7]">Open</button>
      <button onclick="switchTab('closed')" id="closed-btn"
        class="cursor-pointer flex-1 sm:flex-none min-w-[100px] rounded-sm text-white py-2 px-3 border-[#e4e4e7]">Closed</button>
    </section>


    <section id="issues-container"
      class=" bg-white flex flex-col gap-8 md:flex-row justify-between p-6 mt-4 rounded-t-2xl rounded-tr-2xl shadow-sm ">

      <!-- All status -->
      <div class="flex gap-2">
        <img class="w-6 h-7 md:w-10 md:h-10" src="./assets/Aperture.png" alt="">
        <div class="issues flex flex-col justify-center">
          <p class="text-[20px] font-semibold text-[#1f2937]"><span id="count"></span> Issues</p>
          <p class="text-[16px] leading-[1.2] font-normal text-[#64748b]">Track and manage your project issues</p>
        </div>
      </div>

      <!-- issues -->
      <div class="flex gap-2 items-center">
        <div class="flex items-center gap-1">
          <span class="w-3 h-3 rounded-full bg-[#10B981]"></span>Open
        </div>
        <span class="w-3 h-3 rounded-full bg-[#a855f7]"></span>Closed
      </div>
      <!-- </div> -->
    </section>

  </section>
  <!-- spinner -->
  <div id="spinner" class="hidden flex justify-center mt-10">
    <span class="loading loading-spinner text-green-500"></span>
  </div>
  <!-- card -->
  <section id="card-container"
    class="max-w-[1110px] mx-auto mt-4 grid grid-cols-1 md:grid-cols-3 shadow-lg mb-5 bg-[#fbfbfb] gap-6 p-6">
  </section>

  <!-- modal -->
  <dialog id="my_modal_1" class="modal">
    <div class="modal-box max-2xl">
      <div id="modal-info"></div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>


  <script src="./index.js"></script>
</body>

</html>
